server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: docflow-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:docflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:9a2f8c4e7b1d6f3a5c8e2b4d6f8a0c2e4f6a8b0c2d4e6f8a0c2e4f6a8b0c2d4e}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: INFO
    com.docflow: DEBUG
